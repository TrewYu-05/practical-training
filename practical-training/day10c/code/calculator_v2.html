<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>多功能前端计算器升级版</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; }
        .calc-wrapper {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 350px;
            background-color: #f0f8ff;
        }
        input, select, button {
            padding: 8px;
            font-size: 16px;
            margin: 5px 0;
        }
        .result-box {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="calc-wrapper">
        <h3>多功能计算器</h3>
        <input type="number" id="num1" placeholder="数字 1">

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>

        <input type="number" id="num2" placeholder="数字 2"><br>

        <button onclick="performCalculation()">= 计算</button>

        <div class="result-box" id="result">结果: </div>
    </div>

    <script>
        // 封装自用的DOM选择器 $
        function $(selector) {
            return document.querySelector(selector);
        }

        function performCalculation() {
            const n1 = parseFloat($('#num1').value);
            const n2 = parseFloat($('#num2').value);
            const op = $('#operator').value;
            let res = 0;

            if (isNaN(n1) || isNaN(n2)) {
                $('#result').innerText = "结果: 请输入有效的数字";
                return;
            }

            // 利用 switch-case 多分支结构实现加减乘除
            switch (op) {
                case "+":
                    res = n1 + n2;
                    break;
                case "-":
                    res = n1 - n2;
                    break;
                case "*":
                    res = n1 * n2;
                    break;
                case "/":
                    if (n2 === 0) {
                        $('#result').innerText = "结果: 除数不能为0";
                        return;
                    }
                    res = n1 / n2;
                    break;
                default:
                    res = "未知操作";
            }

            $('#result').innerText = "结果: " + res;
        }
    </script>
</body>
</html>
